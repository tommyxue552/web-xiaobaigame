<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">游戏详情 - 小白游戏资源站</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

    <!-- ==================== 顶部导航 ==================== -->
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">小白<span>游戏</span></a>
            <nav class="main-nav">
                <a href="/">首页</a>
                <a href="/frontend/games.html">游戏列表</a>
                <a href="/admin/index.html">后台管理</a>
            </nav>
            <button class="mobile-menu-btn" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- ==================== 面包屑导航==================== -->
    <nav class="breadcrumb">
        <div class="container">
            <a href="/">首页</a>
            <span class="breadcrumb-sep">/</span>
            <a href="/frontend/games.html">游戏列表</a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current" id="breadcrumb-title">加载中...</span>
        </div>
    </nav>

    <!-- ==================== 游戏详情主体 ==================== -->
    <main class="container game-detail-main">

        <!-- 加载骨架 -->
        <div class="detail-loading" id="detail-loading">
            <div class="loading-cover skeleton"></div>
            <div class="loading-info">
                <div class="skeleton skeleton-text" style="width:60%"></div>
                <div class="skeleton skeleton-text short" style="width:30%"></div>
                <div class="skeleton skeleton-text" style="width:80%"></div>
                <div class="skeleton skeleton-text" style="width:50%"></div>
            </div>
        </div>

        <!-- 实际内容（初始隐藏） -->
        <div class="detail-content" id="detail-content" style="display:none">

            <!-- 封面 + 基本信息 -->
            <section class="detail-hero">
                <div class="detail-cover-wrap">
                    <img id="detail-cover" class="detail-cover" src="" alt="">
                </div>
                <div class="detail-hero-body">
                    <h1 class="detail-title" id="detail-title"></h1>
                    <div class="detail-tags" id="detail-tags"></div>
                    <div class="detail-meta-grid" id="detail-meta-grid"></div>
                </div>
            </section>

            <!-- 截图展示 -->
            <section class="detail-section" id="detail-screenshots-section">
                <h2 class="detail-section-title">游戏截图</h2>
                <div class="screenshots-gallery" id="screenshots-gallery"></div>
                <!-- 截图灯箱 -->
                <div class="screenshot-lightbox" id="screenshot-lightbox">
                    <button class="lightbox-close">&times;</button>
                    <img id="lightbox-img" src="" alt="">
                    <button class="lightbox-prev">&lsaquo;</button>
                    <button class="lightbox-next">&rsaquo;</button>
                </div>
            </section>

            <!-- 游戏简介-->
            <section class="detail-section">
                <h2 class="detail-section-title">游戏简介</h2>
                <div class="detail-desc" id="detail-desc"></div>
            </section>

        </div>
    </main>

    <!-- ==================== 底部下载栏（固定）==================== -->
    <div class="download-bar" id="download-bar" style="display:none">
        <div class="container download-bar-inner">
            <div class="download-bar-info">
                <span class="download-bar-title" id="download-bar-title"></span>
                <span class="download-bar-size" id="download-bar-size"></span>
            </div>
            <button class="btn btn-primary download-bar-btn" id="download-bar-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                下载游戏
            </button>
        </div>
    </div>

    <!-- ==================== 页脚 ==================== -->
    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 小白游戏资源站? All rights reserved.</p>
        </div>
    </footer>

    <script src="/frontend/js/game-detail.js"></script>
</body>
</html>
