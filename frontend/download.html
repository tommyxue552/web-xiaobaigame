<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码下载 - 小白游戏资源站</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Microsoft YaHei", sans-serif;
            background: #14141e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .header {
            margin-bottom: 30px;
        }
        .header .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
        }
        .header .logo span { color: #e94560; }
        .qr-container {
            background: #1e1e32;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
        }
        .qr-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .qr-game-name {
            color: #e94560;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }
        .qr-code {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .qr-code img {
            width: 220px;
            height: 220px;
            border-radius: 8px;
            background: #fff;
            padding: 8px;
        }
        .qr-code .qr-placeholder {
            width: 220px;
            height: 220px;
            background: #f5f5f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 0.85rem;
        }
        .qr-tip {
            color: #999;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .qr-tip svg { flex-shrink: 0; }
        .qr-url {
            margin-top: 16px;
            color: #666;
            font-size: 0.75rem;
            word-break: break-all;
            max-width: 100%;
        }
        .back-link {
            margin-top: 24px;
            color: #777;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #e94560; }
        #error-msg { color: #e94560; font-size: 0.9rem; margin-top: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="/" class="logo">小白<span>游戏</span></a>
    </div>
    <div class="qr-container">
        <h1 class="qr-title">扫码下载</h1>
        <p class="qr-game-name" id="game-name">游戏</p>
        <div class="qr-code" id="qr-code">
            <div class="qr-placeholder">加载中...</div>
        </div>
        <p class="qr-tip">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                <line x1="12" y1="18" x2="12.01" y2="18"/>
            </svg>
            请使用手机扫码下载
        </p>
        <p class="qr-url" id="download-url-text"></p>
        <p id="error-msg"></p>
    </div>
    <a class="back-link" id="back-link" href="/">&larr; 返回首页</a>

    <script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var url = params.get('url') || '';
        var title = params.get('title') || '游戏';
        var gameId = params.get('id') || '';

        document.getElementById('game-name').textContent = title;
        document.getElementById('download-url-text').textContent = url || '暂无链接';
        if (gameId) {
            document.getElementById('back-link').href = '/game/' + gameId;
        }

        var qrContainer = document.getElementById('qr-code');
        var qrUrl = '';

        if (url) {
            // 使用 Google Chart API 生成二维码（备用方案）
            qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='
                + encodeURIComponent(url);
        } else if (gameId) {
            // 通过后端 API 获取二维码
            qrUrl = '/api/qrcode/' + gameId;
        }

        if (qrUrl) {
            var img = document.createElement('img');
            img.src = qrUrl;
            img.alt = '下载二维码';
            img.onerror = function () {
                qrContainer.innerHTML = '<div class="qr-placeholder">二维码生成失败</div>';
                document.getElementById('error-msg').textContent = '二维码加载失败，请直接使用下载链接';
            };
            qrContainer.innerHTML = '';
            qrContainer.appendChild(img);
        } else {
            qrContainer.innerHTML = '<div class="qr-placeholder">暂无下载链接</div>';
        }
    })();
    </script>

</body>
</html>
